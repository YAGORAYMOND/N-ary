 ===========================================================
  N-ARY ENGINE: TO-DO LIST (ROADMAP DE DESENVOLUPAMENT)
  ===========================================================
FALLOS:

- Quan borres una es borren les dues

  [ ] 1. AUDIO ENGINE: FIDELITAT I FÍSICA
      [ ] Implementar PINK NOISE: El 'source noise' actual és blanc. 
          Necessitem un filtre de 1/f per a textures orgàniques.
      [ ] LFO MODULATION ENGINE: Fer que 'cycle' i 'drift' realment 
          modifiquin els paràmetres en temps real (AudioParam automation).
      [ ] TRUE JITTER: Afegir el paràmetre 'jitter' per desplaçar el start-time 
          de cada gra aleatòriament (actualment el rate és massa rítmic).
      [ ] FEEDBACK DELAY NETWORK: Millorar el 'reverb' perquè no sigui només 
          convolució, sinó una cua que es retroalimenta infinitament.

  [ ] 2. TONALITAT: MICROTONALITAT NATIVA
      [ ] TUNING TABLES: Crear un diccionari amb sistemes reals 
          (31-TEIT, 19-TET, Pythagorean, Just Intonation).
      [ ] SCALE LOCKING: Implementar la funció 'scale' per forçar que 
          els 'step' i 'pitch' caiguin sempre en ràtios harmòniques.
      [ ] POLYPHONIC FLUX: Permetre que un sol flux 'N-ary' generi 
          acords complexos si es defineixen múltiples ràtios al pitch.

  [ ] 3. INTERFÍCIE (UI/UX)
      [ ] SYNTAX HIGHLIGHTING: Afegir colors al textarea perquè es 
          distingeixin 'source', 'pitch', i els valors numèrics.
      [ ] FILE DROP SOURCE: Permetre arrossegar un .wav/.mp3 per usar-lo 
          com a buffer en lloc de només oscil·ladors (Essencial Microcosm).
      [ ] HOLOGRAPHIC VISUALIZER: Que el canvas reaccioni realment a la

  [ ] 4. OPTIMITZACIÓ (ELIMINACIÓ DEFINITIVA DE CLICKS)
      [ ] AUDIO WORKLET: Moure tot el càlcul de grans a un fil separat (Worker). 
          setInterval() és poc precís i és el culpable dels micro-clicks rítmics.
      [ ] ZERO-CROSSING DETECTION: Que el gra només s'inicii quan l'ona 
          està a zero per evitar transitoris agressius.

  [ ] 5. SISTEMA N-ary (LÒGICA PROPIA)
      [ ] INTERFERÈNCIA: Que un flux pugui modular-ne un altre 
          (Ex: 'reverb' de Flux A controlat per l'activitat de Flux B).
      [ ] MACRO/MICRO FOCUS: Refinar la transició entre els dos modes 
          com una interpolació suau d'envolupants.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nary: natural patterns sample-oriented live coding environment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <style>
        body {
                margin: 0;
                background: #1a1a1a;
                color: white;
                font-family: monospace;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            .cm-s-monokai.CodeMirror {
                flex: 1;
                font-size: 18px;
                background: #1a1a1a;
            }

            #log {
                padding: 4px 8px;
                color: #888;
                border-top: 1px solid #333;
                }

            .cm-s-monokai .CodeMirror-gutters {
                background: #1a1a1a;
                border-right: none;
            }

            .cm-s-monokai .CodeMirror-linenumber {
                color: #888;
            }

            .cm-comment {

            }
            
           .CodeMirror-hscrollbar {
                display: none !important;
            }
    </style>
</head>
<body>

<textarea id="code-editor">

drums > source kick loop 4
guit1 > source guitar loop 2 

// EXECUTE: Ctrl + Enter
// STOP: Ctrl + .

// Click on the loop bar, then:
//  p = play
//  w = write
//  e = erase
//  Del = clear

</textarea>

<div id="log">Console: idle</div>

<script>
// 1. VARIABLES GLOBALS
    window.samples = {};
    // Samples que venen de base.
    window.preloadSamples = {

        //percusió
        "kick": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/perc/drums_99sounds/kick-electro01.wav",
        "kick2": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/perc/drums_99sounds/kick-tape.wav",
        "kick3": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/perc/drums_99sounds/kick-vinyl01.wav",
        "kick4": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/perc/drums_99sounds/kick-classic.wav",     
        "kick5":  "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/perc/fatbass/fatbass_1.wav",
        "kick6": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/perc/drums_99sounds/kick-deep.wav",
        
        
        "snare": "TBD",
        "hat": "TBD",
        "clap": "TBD",
        "shaker": "",

        //instruments
        "guitar": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/instruments/guitar_C_rec.wav",
        "violin": "TBD",
        "piano": "TBD",
        "choir": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/aachen/choir4.mp3",
        //uhhh_C:'vocals/uhhh/uhhh_C_choir.wav' 

        //textures
        "pink": "TBD",
        "vinyl": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/noise/vinyl1.wav",
        "rain": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/noise/rain_crackle.wav",
        "conversations": "TBD",
        "birds": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/nature/birds1.mp3",
    
        //pads
        "field_c": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/field/field_c_2.wav",
        "city": "https://raw.githubusercontent.com/YAGORAYMOND/samples/main/pad/sichuan_ambience_pad_C.wav",
    
    }

    window.repo = ""; 
    const logElement = document.getElementById('log');
    window.activeLoops = {}; 
    //per controlar el widget de la barra:
    let currentLoopWidget = null; // Guarda el widget visual de CodeMirror
    let targetLoopDuration = 0;   // Durada en segons
    let loopEvents = [];          // Esdeveniments (valors entre 0 i 1)
    let isPressingErase = false;  // Estat de la tecla 'o'

    // CREEM LA REVERB GLOBAL (Una sola vegada)
    const globalReverb = new Tone.Reverb({
        decay: 4,       // Segons de cua
        wet: 0.0        // Quantitat de barreja (50%)
    }).toDestination();
    globalReverb.generate(); // Prepara l'efecte

    // 2. EL MOTOR (Nary Engine)
    const nary = {
        fluxParams: {},
        triggerFlux: (id, params, time, ignoreActivity = false) => {

            const sourceName = params.source?.trim();
            if (!sourceName) {
                console.warn(`Missing source in track "${trackName}"`);
                return;
            }
            if (!window.samples[sourceName]) {
                console.warn(`Sample "${sourceName}" not found`);
                return;
}
            const shimmer = params.shimmer ? parseFloat(params.shimmer) : 0;
            const scatter = params.scatter ? parseFloat(params.scatter) : 0;
            const harmonics = [1, 2, 1.5, 0.75, 4];
            const activity = params.activity ? parseFloat(params.activity) : 1;
                if (
                    !ignoreActivity &&
                    Math.random() > activity
                )
                    return;

                const revValue = params.reverb ? parseFloat(params.reverb) : 0.5;
                
                harmonics.forEach((h, i) => {
                    // La probabilitat de veus extra depèn del shimmer i el scatter
                    if (i > 0 && Math.random() > (shimmer + scatter) / 2) return;

                    // L'essència del SCATTER: un desplaçament en el temps que no afecta la nota base (i=0)
                    const delay = i === 0 ? 0 : Math.random() * (scatter * 0.3);
                    const sampleTime = time + delay;

                    const fFreq = i === 0 ? 8000 : (1 - revValue) * 4000 + 200;
                    const filter = new Tone.Filter(fFreq, "lowpass").connect(globalReverb);

                    const envelope = new Tone.Gain(0).connect(filter);
                    const player = new Tone.Player({
                        url: window.samples[sourceName],
                        autostart: false,
                        onload: () => {
                            const p = parseFloat(params.pitch) || 0;
                            const detune = (Math.random() * 0.1 - 0.05) * shimmer;
                            player.playbackRate = (Math.pow(2, p / 12) * h) + detune;
                            
                            const duration = params.len
                                ? parseFloat(params.len)
                                : null;

                            const panner = new Tone.Panner(0).connect(envelope);
                            player.connect(panner);

                            const vol = i === 0 ? 1.3 : (0.7 / i) * (shimmer + scatter);
                            
                            //Envelope
                            if (duration !== null) {
                                envelope.gain.setValueAtTime(0, sampleTime);
                                envelope.gain.linearRampToValueAtTime(vol, sampleTime + 0.03);
                                envelope.gain.setValueAtTime(
                                    vol,
                                    sampleTime + duration - 0.03
                                );
                                envelope.gain.linearRampToValueAtTime(
                                    0,
                                    sampleTime + duration
                                );
                            } else {
                                envelope.gain.value = vol;
                            };

                            player.start(sampleTime);

                            if (duration !== null) {
                                player.stop(sampleTime + duration);
                            }

                            const cleanupTime =
                                duration !== null
                                    ? duration + 2
                                    : player.buffer.duration + 2;

                            setTimeout(() => {
                                player.dispose();
                                panner.dispose();
                                envelope.dispose();
                                filter.dispose();
                            }, cleanupTime * 1000);                            
                        }
                    });
                });
            },
        createFlux: (id, params) => {
            const sourceName = params.source?.trim();
            if (!window.samples[sourceName]) return;

            Tone.getDestination().volume.value = 0; 

            const interval = 1/120; // 120 Hz de precisió fixa per defecte
            const shimmer = params.shimmer ? parseFloat(params.shimmer) : 0;
            const scatter = params.scatter ? parseFloat(params.scatter) : 0;
            const harmonics = [1, 2, 1.5, 0.75, 4]; 
            
            //control d'esdeveniments a sonar (barra)
            let previousTransportSeconds =
                Tone.Transport.seconds;

            const loop = new Tone.Loop(time => {
                // Sincronització amb la barra visual (si està activa)
            if (naryUI.events[id]) {
                const currentDuration =
                    naryUI.durations[id] || 5;
                const currentTransportSeconds =
                    Tone.Transport.seconds;
                const startTime =
                    previousTransportSeconds;
                const endTime =
                    currentTransportSeconds;
                naryUI.events[id].forEach(evPos => {
                    const eventTime =
                        evPos * currentDuration;
                    const startCycle =
                        Math.floor(
                            startTime / currentDuration
                        );
                    const endCycle =
                        Math.floor(
                            endTime / currentDuration
                        );
                    for (
                        let cycle = startCycle;
                        cycle <= endCycle;
                        cycle++
                    ) {
                        const absoluteEventTime =
                            cycle * currentDuration +
                            eventTime;
                        if (
                            absoluteEventTime > startTime &&
                            absoluteEventTime <= endTime
                        ) {
                            nary.triggerFlux(
                                id,
                                params,
                                time
                            );
                        }
                    }
                });
                previousTransportSeconds =
                    currentTransportSeconds;
            }
               
                

            }, interval).start(0);
            
            activeLoops[id] = loop;
        }
    };


    // 3. INTERFICIE VISUAL
    const naryUI = {
        widgets: {},      
        durations: {},    // MODIFICAT: Ara guardem la durada de cada ID: { atmosfera: 4, ritme: 2 }
        events: {},       
        isEraseActive: false,
        eraseId: null,
        selectedId: null,

        injectBar: function(id, lineIndex) {
            if (this.widgets[id]) {
                this.widgets[id].clear();
            }

            if (!this.events[id]) {
                this.events[id] = [];
            }

            // Si aquesta ID no té cap durada assignada encara, li donem 5s per defecte
            if (!this.durations[id]) {
                this.durations[id] = 5;
            }

            const container = document.createElement('div');
            container.style.cssText = 'display: inline-block; margin-left: 15px; vertical-align: middle;';

            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 18;
            canvas.style.cssText = 'background: #000; border: 1px solid #555; border-radius: 3px; display: block;';
            canvas.addEventListener('click', () => {
                naryUI.selectedId = id;
                logElement.innerText = `PATTERN MODE: ${id}`;
            });

            container.appendChild(canvas);

            this.widgets[id] = editor.addLineWidget(lineIndex, container, {
                coverGutter: false,
                noHScroll: true
            });

            this.startAnimation(id, canvas);
        },

        //crea les barres de esdeveniments
        startAnimation: function(id, canvas) {
            const ctx = canvas.getContext('2d');
            const draw = () => {
                if (!document.body.contains(canvas)) {
                    return;
                }
                requestAnimationFrame(draw);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (naryUI.selectedId === id) {
                    ctx.strokeStyle = '#FFEB3B';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(0.5, 0.5, canvas.width - 1, canvas.height - 1);
                }
                else {
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(0, 0, canvas.width, canvas.height);
                }
                
                //Cada capçal utilitza la seva pròpia durada independent per moure's
                const currentDuration = this.durations[id] || 5;
                const progress = (Tone.Transport.seconds % currentDuration) / currentDuration;
                const headX = progress * canvas.width;

                // Fa que errase ('e') nomes funcioni sobre la barra que toca 
                if (
                    this.isEraseActive &&
                    this.eraseId === id
                ) {
                    this.events[id] = this.events[id].filter(
                        ev => Math.abs(ev - progress) > 0.03
                    );

                    ctx.fillStyle = 'rgba(244, 67, 54, 0.4)';
                    ctx.fillRect(headX - 6, 0, 12, canvas.height);
                }

                // Dibuixar línies blanques de la seva pròpia memòria
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                if (this.events[id]) {
                    this.events[id].forEach(ev => {
                        ctx.beginPath(); ctx.moveTo(ev * canvas.width, 0); ctx.lineTo(ev * canvas.width, canvas.height); ctx.stroke();
                    });
                }

                //linea vermella si esta en mode "d" i blanca sino
                ctx.strokeStyle =
                    (this.isEraseActive && this.eraseId === id)
                        ? '#f44336'
                        : '#FFEB3B';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(headX, 0); ctx.lineTo(headX, canvas.height); ctx.stroke();
            };
            draw();


        }
    };


    // 4. CONTROL DE TECLAT (inputs)
    const naryInput = {
        init: function() {
            document.addEventListener('keydown', e => {
                // Si la tecla s'està mantenint premuda, ignorar, et quedes només amb el 1er click
                if (e.repeat) return;

                const key = e.key.toLowerCase();

               if (
                    (e.key === 'Delete' || e.key === 'Backspace') &&
                    naryUI.selectedId
                ) {
                    naryUI.events[naryUI.selectedId] = [];

                    logElement.innerText =
                        `CLEARED: ${naryUI.selectedId}`;

                    e.preventDefault();
                    return;
                }
                
                if (key !== 'w' && 
                    key !== 'p' && 
                    key !== 'e'
                ) return;

                const activeId = naryUI.selectedId;

                if (!activeId) return;

                if (!naryUI.events[activeId]) return;
             

                // CAMBIAT: Calculem el progrés usant la durada específica d'aquesta ID de línia
                const currentDuration = naryUI.durations[activeId] || 5; // <-- NOU
                const progress = (Tone.Transport.seconds % currentDuration) / currentDuration; // <-- CAMBIAT

                if (key === 'w') {
                    naryUI.events[activeId].push(progress);
                }

                if (key === 'p') {
                    const params = nary.fluxParams[activeId];
                    if (params) {
                        nary.triggerFlux(
                            activeId,
                            params,
                            Tone.now(),
                            true
                        );
                    }
                }

                if (key === 'e') {
                    naryUI.isEraseActive = true;
                    naryUI.eraseId = activeId;
                }
            });

            document.addEventListener('keyup', e => {
                if (e.key.toLowerCase() === 'e') {
                    naryUI.isEraseActive = false;
                    naryUI.eraseId = null;
                }
            });
        }
    };

// Inicialitzem els controls de teclat un sol cop
naryInput.init();

    // 5. EDITOR
    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        lineNumbers: true, 
        mode: "javascript", 
        theme: "monokai"
    });

    // Quan cliquem dins del codi, sortim del mode patró
    editor.on('mousedown', () => {
        naryUI.selectedId = null;
        logElement.innerText = "TEXT MODE";
    });

    
    // 6. EXECUCIÓ (Amb el reset de volum corregit)
    async function execute() {
        console.log("Comandament EXECUTE rebut");
        logElement.innerText = "EXECUTING...";
        
        //netejar load samples (pq no es tornin a carregar)
        window.samples = {
            ...window.preloadSamples //afegim les samples per defecte
        };
        window.repo = "";
        
        await Tone.start();

        reload(); //no fem stop sino reload perque no pari el rellotge intern
        
        Tone.getDestination().volume.value = 0; 
        
        const code = editor.getValue();
        const lines = code.split('\n');
        
        let currentId = null;
        let params = {};

        lines.forEach(line => {
            //commentar amb //
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('//')) return;

            //importar samples 
            const repoMatch = trimmed.match(
                /^repo\s+"([^"]+)"$/
            );
            if (repoMatch) {
                window.repo = repoMatch[1];
                return;
            }

            const importMatch = trimmed.match(
                /^import\s+(\S+)\s+"([^"]+)"$/
            );

            if (importMatch) {
                const name = importMatch[1];
                const url = importMatch[2];

                window.samples[name] = window.repo
                    ? `${window.repo}/${url}`
                    : url;

                console.log("Imported:", name);
                return;
                }            

            if (line.includes('>')) {
                if (currentId) {
                    nary.fluxParams[currentId] = {...params};
                    nary.createFlux(currentId, params);
                }

                const parts = line.split('>');
                currentId = parts[0].trim();
                params = {}; 
                
                const inline = parts[1].trim().split(/\s+/);
                for (let i = 0; i < inline.length; i += 2) {
                    if (inline[i] && inline[i+1]) {
                        params[inline[i]] = inline[i+1];
                        
                        // NOU: Si l'usuari ha definit un 'loop X' a la línia principal, guardem la durada real immediatament
                        if (inline[i] === 'loop') { // <-- NOU
                            naryUI.durations[currentId] = parseFloat(inline[i+1]); // <-- NOU
                        } // <-- NOU
                    }
                }
                
                naryUI.injectBar(currentId, lines.indexOf(line));
            } 
            else if (currentId && (line.startsWith(' ') || line.startsWith('\t'))) {
                const p = trimmed.split(/\s+/);
                if (p[0] && p[1]) {
                    params[p[0]] = p[1];
                    
                    // NOU: Si el 'loop X' s'ha definit a sota indentat, també l'enxampem i el guardem
                    if (p[0] === 'loop') { // <-- NOU
                        naryUI.durations[currentId] = parseFloat(p[1]); // <-- NOU
                    } // <-- NOU
                }
            }
        });

        if (currentId) {
            nary.fluxParams[currentId] = {...params};
            nary.createFlux(currentId, params);
        }

        if (Tone.Transport.state === "stopped") {
            Tone.Transport.start();
        }
        
        logElement.innerText = "RUNNING: " + Object.keys(activeLoops).join(", ");
    }

    // 6. STOP (Més net)
   function stop() {
        console.log("Comandament STOP rebut");
        logElement.innerText = "STOPPED";

        // Rebaixem el volum mestre a -Infinity per evitar clics estranys
        Tone.getDestination().volume.value = -Infinity;

        // Aturem el transport de Tone.js
        Tone.Transport.stop();
        Tone.Transport.cancel();

        // Netegem tots els bucles d'àudio actius utilitzant la llista correcta
        if (window.activeLoops) {
            Object.values(activeLoops).forEach(loop => {
                loop.stop();
                loop.dispose();
            });
        }
        window.activeLoops = {}; // Reiniciem el magatzem de bucles

        // NETEJA DE LES BARRES INTERACTIVES (NaryUI)
        if (window.naryUI) {
            // Esborrem físicament tots els canvas de la pantalla
            Object.values(naryUI.widgets).forEach(w => {
                if (w && typeof w.clear === 'function') w.clear();
            });
            
            // Reiniciem la memòria visual i de ritmes
            naryUI.widgets = {};
            naryUI.events = {};
        }
    }

    //7. RELOAD: Esborra els loops i els esdeveniments pero no para el rellotge (per quan refas ctrl+enter)
    function reload() {
        console.log("Comandament RELOAD rebut");
        // eliminem esdeveniments programats
        Tone.Transport.cancel();
        // eliminem loops antics
        if (window.activeLoops) {
            Object.values(activeLoops).forEach(loop => {
                loop.stop();
                loop.dispose();
            });
        }
        window.activeLoops = {};
    }

    // Per si fas clic fora de l'editor, que els shortcuts funcionin igual
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            execute();
        }
        if (e.ctrlKey && e.key === '.') {
            e.preventDefault();
            stop();
        }
    });
