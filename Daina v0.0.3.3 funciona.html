    window.fx = {

    let currentLoopWidget = null; // Guarda el widget visual de CodeMirror

    // bus de efectes globals (al so total):
    window.buses = {};

        new Tone.Delay(
            window.fx.predelay
        );

        new Tone.Reverb({

    window.trackFX = {};

    //log
    window.naryStatus = {
        active: [],
        info: [],
        warnings: [],
        errors: []
    };
    function statusReset(){
        window.naryStatus = {
            active: [],
            info: [],
            warnings: [],
            errors: []
        };
    }
    function statusActive(id){
        if(!window.naryStatus.active.includes(id))
            window.naryStatus.active.push(id);
    }
    function statusInfo(msg){
        window.naryStatus.info.push(msg);
    }
    function statusWarning(msg,line){
        window.naryStatus.warnings.push({
            line,
            msg
        });
    }
    function statusError(msg,line){
        window.naryStatus.errors.push({
            line,
            msg
        });
    }
    //actualitzar el log a cada ctrl + enter
    function statusUpdate(){
        const parts = [];
        // active
        if(window.naryStatus.active.length){
            parts.push("ACTIVE: " + window.naryStatus.active.join(", "));
        }
        // info
        window.naryStatus.info.forEach(msg=>{ parts.push(msg);});
        // warnings
        window.naryStatus.warnings.forEach(w=>{
            if(w.line!=null){
                parts.push(`<span style="color:#FFD54F">⚠ ln.${w.line} ${w.msg}</span>`);
            }else{
                parts.push(`<span style="color: #FFD54F;">⚠ ${w.msg}</span>`);
            }
        });
        //errors
        window.naryStatus.errors.forEach(e=>{
            if(e.line!=null){
                parts.push(`<span style="color: #FF4A4A;">(>_<) ln.${e.line} ${e.msg}</span>`);
            }else{
                parts.push(`<span style="color: #FF4A4A;">(>_<) ${e.msg}</span>`);
            }
        //join (representar els elements del log encadenats amb un pipe |)
        });
        logElement.innerHTML =
            parts.join(" | ");
    }

    window.buses.reverbDelay.connect(

    window.buses.reverb.toDestination();

    //////////////////////////////
    // 2. EL MOTOR (Nary Engine)
    /////////////////////////////
    const nary = {
        fluxParams: {},

        //Sequenciador per posició en la barra
        //inclou la opció/funció "rotate"
        getRegionValue: (
            value,
            eventPosition = 0
        ) => {

            if (value === undefined)
                return undefined;

            const values =
                value
                    .toString()
                    .trim()
                    .split(/\s+/);

            if (values.length === 1)
                return values[0];

            const region =
                Math.min(
                    Math.floor(
                        eventPosition *
                        values.length
                    ),
                    values.length - 1
                );

            const ctx =
                window.currentTrackContext;

            const rotate =
                parseInt(
                    ctx?.params?.rotate || 0
                );

            const iteration =
                window.loopIterations[
                    ctx?.id
                ] || 0;

            const rotatedRegion =
                (
                    region +
                    rotate * iteration
                );

            const index =
                (
                    (rotatedRegion % values.length)
                    + values.length
                ) % values.length; //funcioina tmb amb rotate < 0

            return values[index];
        },

        triggerFlux: (
            id,
            params,
            time,
            ignoreActivity = false,
            eventPosition = 0 //per poder definir els parametres que li toquen al sample
        ) => {
            window.currentTrackContext = {
                id,
                params
            };
            const sourceName = params.source?.trim();
            if (!sourceName) {
                statusError("Missing source");
                statusUpdate();
                return;
            }  
            if (!window.samples[sourceName]) {
                return;
            }
            const shimmer = params.shimmer ? parseFloat(params.shimmer) : 0;
            const scatter = params.scatter ? parseFloat(params.scatter) : 0;
            const harmonics = [1, 2, 1.5, 0.75, 4];
            const activity =
                params.activity
                    ? parseFloat(
                        nary.getRegionValue(
                            params.activity,
                            eventPosition
                        )
                    )
                    : 1;
                if (
                    !ignoreActivity &&
                    Math.random() > activity
                )
                    return;

                    const revValue =
                        parseFloat(
                            nary.getRegionValue(
                                params.reverb,
                                eventPosition //definit per posició
                            ) || 0 // valor de wet/dry reverb (defecte 0)
                        );   
                
                harmonics.forEach((h, i) => {
                    // La probabilitat de veus extra depèn del shimmer i el scatter
                    if (i > 0 && Math.random() > (shimmer + scatter) / 2) return;

                    // L'essència del SCATTER: un desplaçament en el temps que no afecta la nota base (i=0)
                    const delay = i === 0 ? 0 : Math.random() * (scatter * 0.3);
                    const sampleTime = time + delay;

                    //lpf
                    const fFreq =
                        params.lpf
                            ? parseFloat(
                                nary.getRegionValue(
                                    params.lpf,
                                    eventPosition //en funció de la seva posició
                                )
                            )
                            : 22050;
                    const filter =
                        new Tone.Filter(
                            fFreq,
                            "lowpass"
                        );

                    // El delay de Tone ja incorpora el camí dry.
                    // Només enviem directe si aquest track no utilitza delay.
                    const trackEffects =
                        window.trackFX[id]?.effects || [];
                    for (const effect of trackEffects) {
                        effect.update(
                            params,
                            eventPosition
                        );
                    }
                    const hasEffects =
                        trackEffects.length > 0 &&
                        parseFloat(params.delay || 0) > 0;
                    if (!hasEffects) {
                        filter.toDestination();
                    }
                    //connectar efectes globals (reverb)
                    const reverbSend =
                        new Tone.Gain(revValue);
                    filter.connect(reverbSend);
                    reverbSend.connect(
                        window.buses.reverbDelay
                    );
                    //cadena d'efectes
                    let currentNode = filter;
                    for (const effect of trackEffects) {
                        currentNode.connect(effect.node);
                        currentNode = effect.node;
                    }
                    if (hasEffects) {
                        currentNode.toDestination();
                    }

                    const envelope = new Tone.Gain(0).connect(filter);
                    const player = new Tone.Player({
                        url: window.samples[sourceName],
                        autostart: false,
                        onload: () => {

                            //pitch
                            const p =
                                parseFloat(
                                    nary.getRegionValue(
                                        params.pitch,
                                        eventPosition //posició event defineix pitch
                                    )
                                ) || 0;
                            const detune = (Math.random() * 0.1 - 0.05) * shimmer;
                            player.playbackRate = (Math.pow(2, p / 12) * h) + detune;
                            
                            //len
                            const duration =
                                params.len
                                    ? parseFloat(
                                        nary.getRegionValue(
                                            params.len,
                                            eventPosition //posicio del event defineix len
                                        )
                                    )
                                    : null;

                            const panner = new Tone.Panner(0).connect(envelope);
                            player.connect(panner);

                            const vol = i === 0 ? 1.3 : (0.7 / i) * (shimmer + scatter);
                            
                            //Envelope (ha donat molts problemes de clicks als samples, despres d'investigar així es robust)
                            if (duration !== null) {
                                envelope.gain.setValueAtTime(0, sampleTime);
                                envelope.gain.linearRampToValueAtTime(
                                    vol,
                                    sampleTime + 0.03
                                );
                                envelope.gain.setValueAtTime(
                                    vol,
                                    sampleTime + duration - 0.03
                                );
                                envelope.gain.linearRampToValueAtTime(
                                    0,
                                    sampleTime + duration
                                );
                            } else {
                                envelope.gain.setValueAtTime(
                                    vol,
                                    sampleTime
                                );
                            }

                            player.start(sampleTime);

                            if (duration !== null) {
                                player.stop(sampleTime + duration);
                            }

                            const cleanupTime =
                                duration !== null
                                    ? duration + 2
                                    : player.buffer.duration + 2;

                            setTimeout(() => {
                                const index =
                                    window.activePlayers.indexOf(player);
                                if (index !== -1)
                                    window.activePlayers.splice(index, 1);
                                player.dispose();
                                panner.dispose();
                                envelope.dispose();
                                filter.dispose();
                                reverbSend.dispose();
                            }, cleanupTime * 1000);                            
                        }
                    });
                    window.activePlayers.push(player);
                });
            },
        createFlux: (id, params) => {
            const sourceName = params.source?.trim();
            if (!sourceName)
                return;
            if (!window.samples[sourceName]) 
                return;

            Tone.getDestination().volume.value = 0; 

            //DELAY
            // si el track encara no existeix, el creem
           if (!window.trackFX[id]) {
                window.trackFX[id] = {
                    effects: []
                };
            }
            // si el track encara no té delay, el creem
            if (
                params.delay &&
                window.trackFX[id].effects.length === 0
            ) {
                window.trackFX[id].effects.push(
                    effectFactory.createDelay(params)
                );
            }
            
            //actualitzar delay a cada ctrl enter
            for (const effect of window.trackFX[id].effects) {
                effect.update(params);
            }
            
            window.loopIterations[id] = 0; //per calcular el n de iteració per al rotate
            const interval = 1/120; // 120 Hz de precisió fixa per defecte
            const shimmer = params.shimmer ? parseFloat(params.shimmer) : 0;
            const scatter = params.scatter ? parseFloat(params.scatter) : 0;
            const harmonics = [1, 2, 1.5, 0.75, 4]; 
            
            //control d'esdeveniments a sonar (barra)
            let previousTransportSeconds =
                Tone.Transport.seconds;

            const loop = new Tone.Loop(time => {
            // Sincronització amb la barra visual (si està activa)
            if (naryUI.events[id]) {
                const currentDuration =
                    naryUI.durations[id] || 5;
                const currentTransportSeconds =
                    Tone.Transport.seconds;
                const startTime =
                    previousTransportSeconds;
                const endTime =
                    currentTransportSeconds;
                const startCycle =
                    Math.floor(
                        startTime / currentDuration
                    );
                const endCycle =
                    Math.floor(
                        endTime / currentDuration
                    );

                naryUI.events[id].forEach(evPos => {
                    const eventTime =
                        evPos * currentDuration;

                    for (
                        let cycle = startCycle;
                        cycle <= endCycle;
                        cycle++
                    ) {
                        const absoluteEventTime =
                            cycle * currentDuration +
                            eventTime;
                        if (
                            absoluteEventTime > startTime &&
                            absoluteEventTime <= endTime
                        ) {
                            nary.triggerFlux(
                                id,
                                params,
                                time,
                                false,
                                evPos
                            );
                        }
                    }
                });

                //contador de cicles a +1
                if (endCycle > startCycle) {
                     window.loopIterations[id] +=
                        endCycle - startCycle;
                }
          
                previousTransportSeconds =
                    currentTransportSeconds;
            }
            }, interval).start(0);
            
            activeLoops[id] = loop;

            statusActive(id); 
        }
    };

    //////////////////////
    //2. EFECTES o PEDALS: (els que ja son indpendents, l'objectiu es que tots acabin aqui)
    //////////////////////
    const effectFactory = {
        //DELAY
        createDelay(params){
            const node =
                new Tone.FeedbackDelay();
            node.toDestination();
            return {
                type: "delay",
                node,
                update(params, eventPosition = 0){
                    this.params = structuredClone(params);
                    
                    //dry-wet
                    node.wet.rampTo(
                        parseFloat(
                            nary.getRegionValue(
                                this.params.delay,
                                eventPosition
                            ) || 0
                        ),
                        0.02
                    );

                    //delay time (dt)
                    const delay_time_glide = // temps (s) que triga a arribar al nou valor
                        parseFloat(this.params.dt_glide || 0.3);
                    node.delayTime.rampTo(
                        parseFloat(
                            nary.getRegionValue(
                                this.params.dt,
                                eventPosition
                            ) || 400
                        ) / 1000,
                        delay_time_glide
                    );

                    //delay feedback (dfb)
                    const feedback =
                        parseFloat(
                            nary.getRegionValue(
                                this.params.dfb,
                                eventPosition
                            ) || 0.5
                        );

                    node.feedback.value =
                        Math.max(
                            0,
                            Math.min(
                                feedback,
                                1 //posem rang 0-1 pq no peti
                            )
                        );
                }
            };
        }
    };


    // 3. INTERFICIE VISUAL
    const naryUI = {
        widgets: {},      
        durations: {},    // MODIFICAT: Ara guardem la durada de cada ID: { atmosfera: 4, ritme: 2 }
        events: {},       
        isEraseActive: false,
        eraseId: null,
        selectedId: null,

        injectBar: function(id, lineIndex) {
            if (this.widgets[id]) {
                this.widgets[id].clear();
            }

            if (!this.events[id]) {
                this.events[id] = [];
            }

            // Si aquesta ID no té cap durada assignada encara, li donem 5s per defecte
            if (!this.durations[id]) {
                this.durations[id] = 5;
            }

            const container = document.createElement('div');
            container.style.cssText = 'display: inline-block; margin-left: 15px; vertical-align: middle;';

            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 18;
            canvas.style.cssText = 'background: #000; border: 1px solid #555; border-radius: 3px; display: block;';
            canvas.addEventListener('click', () => {
                naryUI.selectedId = id;
            });

            container.appendChild(canvas);

            this.widgets[id] = editor.addLineWidget(lineIndex, container, {
                coverGutter: false,
                noHScroll: true
            });

            this.startAnimation(id, canvas);
        },

        //crea les barres de esdeveniments
        startAnimation: function(id, canvas) {
            const ctx = canvas.getContext('2d');
            const draw = () => {
                if (!document.body.contains(canvas)) {
                    return;
                }
                requestAnimationFrame(draw);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (naryUI.selectedId === id) {
                    ctx.strokeStyle = '#FFEB3B';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(0.5, 0.5, canvas.width - 1, canvas.height - 1);
                }
                else {
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(0, 0, canvas.width, canvas.height);
                }
                
                //Cada capçal utilitza la seva pròpia durada independent per moure's
                const currentDuration = this.durations[id] || 5;
                const progress = (Tone.Transport.seconds % currentDuration) / currentDuration;
                const headX = progress * canvas.width;

                // Fa que errase ('e') nomes funcioni sobre la barra que toca 
                if (
                    this.isEraseActive &&
                    this.eraseId === id
                ) {
                    this.events[id] = this.events[id].filter(
                        ev => Math.abs(ev - progress) > 0.03
                    );

                    ctx.fillStyle = 'rgba(244, 67, 54, 0.4)';
                    ctx.fillRect(headX - 6, 0, 12, canvas.height);
                }

                // Dibuixar línies blanques de la seva pròpia memòria
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                if (this.events[id]) {
                    this.events[id].forEach(ev => {
                        ctx.beginPath(); ctx.moveTo(ev * canvas.width, 0); ctx.lineTo(ev * canvas.width, canvas.height); ctx.stroke();
                    });
                }

                //linea vermella si esta en mode "d" i blanca sino
                ctx.strokeStyle =
                    (this.isEraseActive && this.eraseId === id)
                        ? '#f44336'
                        : '#FFEB3B';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(headX, 0); ctx.lineTo(headX, canvas.height); ctx.stroke();
            };
            draw();


        }
    };


    // 4. CONTROL DE TECLAT (inputs)
    const naryInput = {
        init: function() {
            document.addEventListener('keydown', e => {
                // Si la tecla s'està mantenint premuda, ignorar, et quedes només amb el 1er click
                if (e.repeat) return;

                const key = e.key.toLowerCase();

               if (
                    (e.key === 'Delete' || e.key === 'Backspace') &&
                    naryUI.selectedId
                ) {
                    naryUI.events[naryUI.selectedId] = [];
                    e.preventDefault();
                    return;
                }
                
                if (key !== 'w' && 
                    key !== 'p' && 
                    key !== 'e'
                ) return;

                const activeId = naryUI.selectedId;

                if (!activeId) return;

                if (!naryUI.events[activeId]) return;
             

                // CAMBIAT: Calculem el progrés usant la durada específica d'aquesta ID de línia
                const currentDuration = naryUI.durations[activeId] || 5; // <-- NOU
                const progress = (Tone.Transport.seconds % currentDuration) / currentDuration; // <-- CAMBIAT

                if (key === 'w') {
                    naryUI.events[activeId].push(progress);
                }
                
                if (key === 'p') {
                    const params =
                        nary.fluxParams[activeId];
                    if (params) {
                        nary.triggerFlux(
                            activeId,
                            params,
                            Tone.now(),
                            true,
                            progress //pq soni exactament amb parametres que toca
                        );
                    }
                }

                if (key === 'e') {
                    naryUI.isEraseActive = true;
                    naryUI.eraseId = activeId;
                }
            });

            document.addEventListener('keyup', e => {
                if (e.key.toLowerCase() === 'e') {
                    naryUI.isEraseActive = false;
                    naryUI.eraseId = null;
                }
            });
        }
    };

// Inicialitzem els controls de teclat un sol cop
naryInput.init();

    // 5. EDITOR
    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        lineNumbers: true, 
        mode: "javascript", 
        theme: "monokai"
    });

    // Quan cliquem dins del codi, sortim del mode patró
    editor.on('mousedown', () => {
        naryUI.selectedId = null;
    });

    
    // 6. EXECUCIÓ (Amb el reset de volum corregit)
    async function execute() {
        console.log("Comandament EXECUTE rebut");
        logElement.innerText = "EXECUTING...";

        statusReset();
        
        //netejar load samples (pq no es tornin a carregar)
        window.samples = {
            ...window.preloadSamples //afegim les samples per defecte
        };
        window.repo = "";
        
        await Tone.start();

        reload(); //no fem stop sino reload perque no pari el rellotge intern
        
        Tone.getDestination().volume.value = 0; 
        
        const code = editor.getValue();
        const lines = code.split('\n');

        const tokenizedLines = lines.map((line, index) => ({
            raw: line,
            trimmed: line.trim(),
            line: index + 1,
            tokens: line.trim()
                ? line.trim().split(/\s+/)
                : []
        }));
                
        let currentId = null;
        let params = {};
        let effects = [];
        //context pel parser (saber si estem dins d'un filtre)
        let currentContext = null;
        let currentEffect = null;

        ////////
        //PARSER
        ////////
        tokenizedLines.forEach(entry => {

            const line = entry.raw;
            const trimmed = entry.trimmed;
            const tokens = entry.tokens;
            const index = entry.line - 1;

            //commentar amb //
            if (!trimmed || trimmed.startsWith('//')) 
                return;

            //Reconeixer variables globals (room i decay del reverb)
            const globalMatch =
                trimmed.match(/^(\w+)\s+([0-9.]+)$/);
            if (
                globalMatch &&
                !line.includes('>') &&
                !line.startsWith(' ') &&
                !line.startsWith('\t')
            ) {
                const key = globalMatch[1];
                const value = parseFloat(globalMatch[2]);
                if (key === "decay")
                    window.fx.decay = value;
                if (key === "predelay")
                    window.fx.predelay = Math.max(0, Math.min(value, 300));
                return;
            }

            //importar samples 
            const repoMatch = trimmed.match(
                /^repo\s+"([^"]+)"$/
            );
            if (repoMatch) {
                window.repo = repoMatch[1];
                return;
            }
            const importMatch = trimmed.match(
                /^import\s+(\S+)\s+"([^"]+)"$/
            );

            if (importMatch) {
                const name = importMatch[1];
                const url = importMatch[2];

                window.samples[name] = window.repo
                    ? `${window.repo}/${url}`
                    : url;

                console.log("Imported:", name);
                return;
                }            

            if (line.includes('>')) {

                if (currentId) {
                    if (!params.source) {
                        statusError(
                            `Track "${currentId}" has no source`,
                            index
                        );
                    }
                    else if (!window.samples[params.source]) {
                        statusError(
                            `Sample "${params.source}" not found`,
                            index
                        );
                    }
                    params.effects = effects;
                    nary.fluxParams[currentId] = {
                        ...params,
                        effects: [...effects]
                    };
                    nary.createFlux(currentId, params);
                }

                const parts = line.split('>');
                currentId = parts[0].trim();

                params = {};
                effects = [];

                //definir el context actual
                currentContext = "track";
                currentEffect = null;
                
                const inline = parts[1].trim().split(/\s+/);
                for (let i = 0; i < inline.length; i += 2) {
                    if (inline[i] && inline[i+1]) {
                        const token = inline[i];
                    
                        // Valida si el paràmetre és correcte a la primera línia
                        if (!PARAMS.has(token)) {
                            statusWarning(`Unknown parameter '${token}'`, index + 1);
                        }
                        const value = inline[i+1];
                        if (
                            token === "rotate" &&
                            !Number.isInteger(Number(value))
                        ) {
                            statusWarning(
                                `rotate expects an integer. Using ${parseInt(value)}.`,
                                index + 1
                            );
                        }
                        params[token] = value;
                        if (token === 'loop') {
                            naryUI.durations[currentId] = parseFloat(inline[i+1]);
                        }
                    }
                }
                
                naryUI.injectBar(currentId, index);
            } 
            else if (currentId) {
                // Ignora capçaleres de track (ja s'han processat abans)
                if (line.includes(">")) {
                    return;
                }
                // Canvi de context: comença un nou efecte
                if (
                    tokens.length === 1 &&
                    EFFECT_TYPES.has(tokens[0])
                ) {
                    currentEffect = {
                        type: tokens[0]
                    };
                    effects.push(currentEffect);
                    currentContext = "effect";
                    return;
                }

                let currentKey = null;
                let values = [];
                
                for (const token of tokens) {
                    if (PARAMS.has(token)) {

                        if (currentKey) {
                            const value = values.join(" ");
                            if (
                                currentContext === "effect" &&
                                currentEffect
                            ) {
                                currentEffect[currentKey] = value;
                            }
                            else {
                                params[currentKey] = value;
                            }
                        }

                        currentKey = token;
                        values = [];
                    } else {
                        //si en token no esta a la llista de funcions tira un warning a la consola 
                        if (
                            /^[a-zA-Z_]\w*$/.test(token) &&
                            !PARAMS.has(token)
                        ) {
                            //warnings.push(
                            statusWarning(
                                `Unknown parameter'${token}'`,
                                index + 1
                            );
                        }
                        values.push(token);
                    }
                }
                if (currentKey) {
                    const value =
                        values.join(" ");
                    if (
                        currentKey === "rotate" &&
                        !Number.isInteger(Number(value))
                    ) {
                        statusWarning(
                            `rotate expects an integer. Using ${parseInt(value)}.`,
                            index + 1
                        );
                    }
                    params[currentKey] = value;
                }
            }
        });

        //error si no encaixa el nom del sample
        if (currentId) {
            if (!params.source) {
                statusError(
                    `Track "${currentId}" has no source`,
                    lines.length
                );
            }
            else if (!window.samples[params.source]) {
                statusError(
                    `Sample "${params.source}" not found`,
                    lines.length
                );
            }
            params.effects = effects;

            //al acabar un track es neteja el context
            currentContext = null;
            currentEffect = null;

            nary.fluxParams[currentId] = {
                ...params,
                effects: [...effects]
            };
            console.log(effects); //verif temp
            nary.createFlux(currentId, params); 
        }

        //a cada ctrl+enter revisa si valor de reverb ha canviat
        if (window.buses.reverbDelay)
            window.buses.reverbDelay.dispose();

        if (window.buses.reverb)
            window.buses.reverb.dispose();

        window.buses.reverbDelay =
            new Tone.Delay(
                window.fx.predelay /1000 //passar de ms a s
            );
        window.buses.reverb =
            new Tone.Reverb({
                decay: window.fx.decay,
                wet: 1
            });
        window.buses.reverbDelay.connect(
            window.buses.reverb
        );
        //connectar: predelay>reverb(que te opció decay)
        window.buses.reverb.toDestination();
        window.buses.reverb.generate();

        if (Tone.Transport.state === "stopped") {
            Tone.Transport.start();
        }
        
        statusUpdate();
    }

    // 6. STOP (Més net)
   function stop() {
        console.log("Comandament STOP rebut");
        logElement.innerText = "STOPPED";

        //Atenuar progressivament el dfb per evitar casos dfb=1 so etern
        Object.values(window.trackFX).forEach(track => {
            track.effects.forEach(effect => {
                if (effect.type === "delay") {
                    effect.node.feedback.rampTo(0,10);
                }
            });
        });

        // Aturem el transport de Tone.js
        Tone.Transport.stop();
        Tone.Transport.cancel();

        // Netegem tots els bucles d'àudio actius utilitzant la llista correcta
        if (window.activeLoops) {
            Object.values(activeLoops).forEach(loop => {
                loop.stop();
                loop.dispose();
            });
        }


        window.activeLoops = {}; // Reiniciem el magatzem de bucles

        //netejar els objectes delays morts perque no s'acumulin
        Object.values(window.trackFX).forEach(track => {
            track.effects.forEach(effect => {
                setTimeout(
                    () => effect.node.dispose(),
                    15000
                );
            });
        });

        window.trackFX = {};

        // NETEJA DE LES BARRES INTERACTIVES (NaryUI)
        if (window.naryUI) {
            // Esborrem físicament tots els canvas de la pantalla
            Object.values(naryUI.widgets).forEach(w => {
                if (w && typeof w.clear === 'function') w.clear();
            });
            
            // Reiniciem la memòria visual i de ritmes
            naryUI.widgets = {};
            naryUI.events = {};
        }
    }

    //7. RELOAD: Esborra els loops i els esdeveniments pero no para el rellotge (per quan refas ctrl+enter)
    function reload() {
        console.log("Comandament RELOAD rebut");
        // eliminem esdeveniments programats
        Tone.Transport.cancel();
        // eliminem loops antics
        if (window.activeLoops) {
            Object.values(activeLoops).forEach(loop => {
                loop.stop();
                loop.dispose();
            });
        }
        
        window.activeLoops = {};

        //elimina delays antics quan clico ctrl enter
        // Object.values(window.trackFX).forEach(fx => {
        //     fx.delay.dispose();
        // });
        // window.trackFX = {};
    }

    // Per si fas clic fora de l'editor, que els shortcuts funcionin igual
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            execute();
        }
        if (e.ctrlKey && e.key === '.') {
            e.preventDefault();
            stop();
        }
    });

</script>
